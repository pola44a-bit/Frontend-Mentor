<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    
    <!-- Zdjęcie -->
    <picture class="card__image">
      <source media="(min-width: 640px)" srcset="./images/image-product-desktop.jpg">
      <img src="./images/image-product-mobile.jpg" 
           alt="Gabrielle Essence Eau De Parfum" 
           class="product-img">
    </picture>

    <!-- Treść -->
    <div class="card__content">
      <p class="category">Perfume</p>
      
      <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
      
      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>
      
      <div class="price">
        <span class="current-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>
      
      <button class="btn">
        <img src="./images/icon-cart.svg" alt="" width="18" height="16">
        Add to Cart
      </button>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
